<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BG GAME</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #121212;
            --card-dark: #1e1e1e;
            --primary-red: #d32f2f;
            --accent-gold: #ffd700;
            --text-light: #ffffff;
            --text-gray: #aaaaaa;
            --blue-action: #0099ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            padding-bottom: 80px;
            overflow-x: hidden;
        }

        .floating-support {
            position: fixed;
            bottom: 100px;
            right: 20px;
            width: 60px;
            height: 60px;
            z-index: 999;
            cursor: pointer;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .marquee-container {
            background: #1e1e1e;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #2d2d2d;
        }

        .marquee-icon { color: var(--primary-red); font-size: 14px; }
        .marquee-scroll { overflow: hidden; white-space: nowrap; flex: 1; }
        .marquee-text { display: inline-block; color: #ddd; font-size: 13px; font-weight: 500; animation: marquee 15s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .notice-modal {
            background: #1f1f1f;
            border: 1px solid #333;
            border-radius: 16px;
            width: 100%;
            max-width: 250px;
            padding: 20px;
            text-align: center;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .gift-icon { font-size: 40px; color: #ffd700; margin-bottom: 10px; display: block; }
        .modal-heading { font-size: 15px; font-weight: 700; margin-bottom: 5px; }
        .modal-sub { font-size: 11px; color: #aaa; margin-bottom: 15px; }
        .bonus-amount { font-size: 24px; color: #ffffff; font-weight: 800; margin-bottom: 15px; }
        .modal-claim-btn {
            background: #d32f2f; color: white; border: none; width: 100%; padding: 10px;
            font-size: 13px; font-weight: 700; border-radius: 6px; cursor: pointer;
        }

        /* Smooth Coin Animation */
        .animated-coin {
            position: fixed;
            color: var(--accent-gold);
            font-size: 20px;
            z-index: 10000;
            pointer-events: none;
            transition: all 0.8s cubic-bezier(0.2, 0, 0.2, 1);
        }

        header { background-color: #1a1a1a; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2d2d2d; }
        .logo { font-size: 22px; font-weight: 800; color: var(--primary-red); letter-spacing: 1px; text-decoration: none; }
        .logo span { color: var(--accent-gold); }
        .header-right { display: flex; align-items: center; gap: 12px; }
        .balance-container { background: linear-gradient(135deg, #2d2d2d, #1e1e1e); padding: 4px 10px; border-radius: 20px; display: flex; align-items: center; gap: 6px; border: 1px solid #444; position: relative; }
        .coin-icon { width: 16px; height: 16px; }
        .balance-amount { font-weight: 600; font-size: 11px; }
        .add-balance { color: var(--primary-red); cursor: pointer; font-weight: bold; font-size: 12px; }
        .icon-btn { position: relative; font-size: 20px; color: var(--text-gray); cursor: pointer; text-decoration: none; }
        .badge { position: absolute; top: -5px; right: -5px; background-color: var(--primary-red); color: white; font-size: 10px; padding: 2px 5px; border-radius: 50%; }
        .hero-banner { width: 100%; position: relative; overflow: hidden; background: #000; cursor: pointer; }
        .hero-banner img { width: 100%; display: block; object-fit: cover; }
        .action-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 15px; }
        .action-card { background: linear-gradient(145deg, #ff3333, #990000); border-radius: 12px; padding: 15px 5px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); cursor: pointer; text-decoration: none; color: #fff; }
        .action-card img { width: 45px; height: 45px; margin: 0 auto 8px; display: block; object-fit: contain; }
        .action-card span { font-size: 12px; font-weight: 600; display: block; margin-bottom: 4px; }
        .action-card .get-btn { background: rgba(0, 0, 0, 0.4); font-size: 10px; padding: 2px 8px; border-radius: 10px; display: inline-block; }
        .games-section { padding: 0 15px 20px 15px; }
        .section-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
        .section-title::before { content: ''; display: inline-block; width: 4px; height: 16px; background-color: var(--primary-red); border-radius: 2px; }
        .games-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .game-card { background-color: var(--card-dark); border-radius: 12px; overflow: hidden; position: relative; border: 1px solid #2d2d2d; box-shadow: 0 4px 8px rgba(0,0,0,0.2); text-decoration: none; color: #fff; }
        .game-card img { width: 100%; height: 150px; object-fit: cover; display: block; }
        .game-info { padding: 8px; text-align: center; background: #252525; font-size: 13px; font-weight: 600; }
        nav.bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background-color: #171717; display: flex; justify-content: space-around; align-items: center; padding: 8px 0; border-top: 1px solid #2d2d2d; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-gray); font-size: 11px; text-decoration: none; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--primary-red); }
        .nav-item img { width: 22px; height: 22px; margin-bottom: 4px; object-fit: contain; }
        .nav-item.center-wheel { position: relative; top: -15px; background: transparent !important; width: 60px; height: 60px; border-radius: 50%; justify-content: center; align-items: center; color: #fff; border: none; display: flex; }
        .nav-item.center-wheel img { width: 70px; height: 70px; object-fit: contain; background: transparent !important; }
    </style>
</head>
<body>

    <img src="https://raw.githubusercontent.com/casinolootprmo/glowing-memory/main/104519387-32033-file_20260419104519376.webp" class="floating-support" onclick="window.location.href='prm.html'">

    <div class="modal-overlay" id="registration-popup">
        <div class="notice-modal">
            <i class="fa-solid fa-gift gift-icon"></i>
            <div class="modal-heading">Registration Bonus</div>
            <div class="modal-sub">New Member Welcome</div>
            <div class="bonus-amount">₹100</div>
            <button class="modal-claim-btn" id="claim-btn-trigger" onclick="triggerCoinAnimation()">CLAIM NOW</button>
        </div>
    </div>

    <header>
        <a href="#" class="logo">BG <span>GAME</span></a>
        <div class="header-right">
            <div class="balance-container" id="target-wallet">
                <img src="https://github.com/casinolootprmo/crispy-enigma/blob/00c8812baa0a457108a52bf67efbc86ed6cfe98f/icon_coin-c935ad85.webp?raw=true" class="coin-icon">
                <span class="balance-amount" id="user-balance">₹0.00</span>
                <span class="add-balance" onclick="window.location.href='prm.html'">+</span>
            </div>
            <a href="prm.html" class="icon-btn">
                <i class="fa-regular fa-bell"></i>
                <span class="badge">32</span>
            </a>
        </div>
    </header>

    <div class="hero-banner" onclick="window.location.href='prm.html'">
        <img src="https://raw.githubusercontent.com/casinolootprmo/scaling-lamp/54bc0634fe3da41feaa16cbf95c26282afb24df0/file_00000000afe47208a5d7f3c60205a6ee.png" alt="iPhone 17 Offer Banner">
    </div>

    <div class="marquee-container">
        <i class="fa-solid fa-volume-high marquee-icon"></i>
        <div class="marquee-scroll">
            <div class="marquee-text">Welcome to BG GAME! The most popular and trusted gaming platform. Register now and claim your exciting bonuses!</div>
        </div>
    </div>

    <section class="action-grid">
        <a href="prm.html" class="action-card"><img src="https://raw.githubusercontent.com/casinolootprmo/glowing-memory/main/homeicon_coin-376595a5.webp" alt="Deposit"><span>Deposit</span><div class="get-btn">Get</div></a>
        <a href="prm.html" class="action-card"><img src="https://raw.githubusercontent.com/casinolootprmo/glowing-memory/main/homeicon_chest-017ae962.webp" alt="Withdraw"><span>Withdraw</span><div class="get-btn">Get</div></a>
        <a href="prm.html" class="action-card"><img src="https://raw.githubusercontent.com/casinolootprmo/glowing-memory/main/homeicon_level-2a9f2b45.webp" alt="VIP"><span>VIP level</span><div class="get-btn">Get</div></a>
        <a href="prm.html" class="action-card">
            <img src="https://github.com/casinolootprmo/crispy-enigma/blob/00c8812baa0a457108a52bf67efbc86ed6cfe98f/turntable_home-783aa091.webp?raw=true" alt="Wheel" style="width: 65px; height: 65px; margin: 0 auto 4px; display: block; object-fit: contain; background: transparent;">
            <span>Wheel</span>
            <div class="get-btn">Get</div>
        </a>
    </section>

    <section class="games-section">
        <div class="section-title">Popular Games</div>
        <div class="games-grid">
            <a href="prm.html" class="game-card"><img src="https://raw.githubusercontent.com/casinolootprmo/urban-disco/154f7898e9204e0fc15bc42a39504346e958af2b/Wingo-Game-favicon.png" alt="Wingo 30S"><div class="game-info">Wingo 30S</div></a>
            <a href="prm.html" class="game-card"><img src="https://raw.githubusercontent.com/casinolootprmo/musical-funicularmnm/263e5489b6d8a1daf104a647dbab5e3a98b23c88/3a1c7940168cda94b1fe4808d617bee6.jpg" alt="Aviator"><div class="game-info">Aviator</div></a>
            <a href="prm.html" class="game-card"><img src="https://raw.githubusercontent.com/casinolootprmo/musical-funicularmnm/263e5489b6d8a1daf104a647dbab5e3a98b23c88/be7f87d4f3a049e5218c1deb1815410d.jpg" alt="Jili Game"><div class="game-info">Jili Slots</div></a>
            <a href="prm.html" class="game-card"><img src="https://raw.githubusercontent.com/casinolootprmo/musical-funicularmnm/7aefe8c857a684db8213d74f411438c618ef95ec/695c195c1edc2ea2ef118053e3d4379e.jpg" alt="777 Slots"><div class="game-info">777 Slots</div></a>
        </div>
    </section>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active"><img src="https://github.com/casinolootprmo/crispy-enigma/blob/00c8812baa0a457108a52bf67efbc86ed6cfe98f/home-80fd01a7.webp?raw=true"><span>Home</span></a>
        <a href="prm.html" class="nav-item"><img src="https://github.com/casinolootprmo/crispy-enigma/blob/00c8812baa0a457108a52bf67efbc86ed6cfe98f/promotion-ecd75cb4.webp?raw=true"><span>Promo</span></a>
        <a href="prm.html" class="nav-item center-wheel"><img src="https://github.com/casinolootprmo/crispy-enigma/blob/00c8812baa0a457108a52bf67efbc86ed6cfe98f/turntable_home-783aa091.webp?raw=true" alt="Wheel"></a>
        <a href="prm.html" class="nav-item"><img src="https://github.com/casinolootprmo/crispy-enigma/blob/00c8812baa0a457108a52bf67efbc86ed6cfe98f/promotion-ecd75cb4.webp?raw=true"><span>Earn</span></a>
        <a href="prm.html" class="nav-item"><img src="https://github.com/casinolootprmo/crispy-enigma/blob/00c8812baa0a457108a52bf67efbc86ed6cfe98f/home-80fd01a7.webp?raw=true"><span>Mine</span></a>
    </nav>

    <script>
        function triggerCoinAnimation() {
            const btn = document.getElementById('claim-btn-trigger');
            const wallet = document.getElementById('target-wallet');
            const popup = document.getElementById('registration-popup');
            
            const btnRect = btn.getBoundingClientRect();
            const walletRect = wallet.getBoundingClientRect();

            for (let i = 0; i < 12; i++) {
                setTimeout(() => {
                    const coin = document.createElement('i');
                    coin.className = 'fa-solid fa-coins animated-coin';
                    
                    coin.style.left = (btnRect.left + btnRect.width / 2) + 'px';
                    coin.style.top = (btnRect.top + btnRect.height / 2) + 'px';
                    document.body.appendChild(coin);

                    setTimeout(() => {
                        coin.style.left = (walletRect.left + 20) + 'px';
                        coin.style.top = (walletRect.top + 10) + 'px';
                        coin.style.transform = 'scale(0.3) rotate(360deg)';
                        coin.style.opacity = '0';
                    }, 50);

                    setTimeout(() => coin.remove(), 900);
                }, i * 80); 
            }

            setTimeout(() => {
                document.getElementById('user-balance').innerText = "₹100.00";
                wallet.style.transform = "scale(1.2)";
                setTimeout(() => wallet.style.transform = "scale(1)", 300);
                popup.style.display = 'none';
            }, 1200);
        }
    </script>
</body>
</html>
